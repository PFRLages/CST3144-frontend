<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>After-School Lessons</title>

    <!-- Vue 2 from CDN (as taught in the workshop) -->
    <script src="https://unpkg.com/vue@2.7.8/dist/vue.js"></script>

    <!-- Our stylesheet -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <!-- Vue mounts to this element -->
    <div id="app">
        <header>
            <h1>{{ sitename }}</h1>
            <button class="cart-toggle" v-on:click="toggleCart" v-bind:disabled="cart.length === 0">
                🛒 {{ showCart ? 'Back to Lessons' : 'View Cart' }} ({{ cart.length }})
            </button>
        </header>

        <main>

            <!-- LESSONS VIEW -->
            <div v-if="!showCart">

                <!-- Sort controls -->
                <div class="sort-controls">
                    <label>
                        Sort by:
                        <select v-model="sortAttribute">
                            <option value="topic">Subject</option>
                            <option value="location">Location</option>
                            <option value="price">Price</option>
                            <option value="space">Spaces</option>
                        </select>
                    </label>

                    <label>
                        Order:
                        <select v-model="sortOrder">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </label>
                </div>

                <!-- Lesson grid -->
                <div class="lesson-grid">
                    <div class="lesson-card" v-for="lesson in sortedLessons" v-bind:key="lesson._id">
                        <img v-bind:src="apiUrl + '/static/images/' + lesson.image" v-bind:alt="lesson.topic"
                            class="lesson-image" />
                        <h2>{{ lesson.topic }}</h2>
                        <p><strong>Location:</strong> {{ lesson.location }}</p>
                        <p><strong>Price:</strong> £{{ lesson.price }}</p>
                        <p><strong>Spaces:</strong> {{ lesson.space }}</p>
                        <button v-on:click="addToCart(lesson)" v-bind:disabled="lesson.space === 0">
                            {{ lesson.space === 0 ? 'No spaces left' : 'Add to cart' }}
                        </button>
                    </div>
                </div>

            </div>

            <!-- CART VIEW -->
            <div v-if="showCart">
                <h2 class="cart-title">Shopping Cart</h2>

                <div class="lesson-grid">
                    <div class="lesson-card" v-for="(lesson, index) in cart" v-bind:key="index">
                        <img v-bind:src="apiUrl + '/static/images/' + lesson.image" v-bind:alt="lesson.topic"
                            class="lesson-image" />
                        <h2>{{ lesson.topic }}</h2>
                        <p><strong>Location:</strong> {{ lesson.location }}</p>
                        <p><strong>Price:</strong> £{{ lesson.price }}</p>
                        <button v-on:click="removeFromCart(index)" class="remove-btn">Remove</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Our Vue logic -->
    <script src="script.js"></script>

</body>

</html>
